services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyclaw}
      POSTGRES_USER: ${POSTGRES_USER:-cyclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyclaw_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyclaw} -d ${POSTGRES_DB:-cyclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://cyclaw:cyclaw_password@postgres:5432/cyclaw}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-cyops_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      X_REDIRECT_URI: ${X_REDIRECT_URI:-http://localhost:8000/api/auth/x/callback}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:8000/api/auth/discord/callback}
      ADMIN_X_USERNAMES: ${ADMIN_X_USERNAMES:-cyops_team}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      API_PROXY_URL: ${API_PROXY_URL:-http://backend:8000}
    depends_on:
      - backend
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

